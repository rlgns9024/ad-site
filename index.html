<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmojiRibbit - 쉽고 빠른 이모지 복사 & 붙여넣기</title>
    <meta
      name="description"
      content="3,600+개의 다양한 이모지와 특수문자를 한 번의 클릭으로 복사하세요. 블로거와 SNS 크리에이터를 위한 완벽한 도구!"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <link rel="stylesheet" href="assets/css/commons.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- Header / Navigation -->
    <header class="site-header">
      <div class="container">
        <div class="site-header__inner">
          <!-- Logo -->
          <a href="#" class="site-logo" aria-label="EmojiRibbit 홈">
            🐸 EmojiRibbit
          </a>

          <!-- Desktop Navigation -->
          <nav class="site-nav" data-nav role="navigation" aria-label="메인 메뉴">
            <a href="#emoji" class="site-nav__link" aria-label="이모지 보러가기">
              😊 이모지
            </a>
            <a href="#combos" class="site-nav__link" aria-label="조합기 보러가기">
              🎨 조합기
            </a>
            <a href="#fonts" class="site-nav__link" aria-label="인스타 폰트 보러가기">
              ✨ 인스타폰트
            </a>
          </nav>

          <!-- Search Bar (Desktop) -->
          <div class="search-wrapper" role="search">
            <input
              type="search"
              class="search-input"
              placeholder="검색... (예: 하트, 동물)"
              aria-label="이모지 및 특수문자 검색"
            />
            <button class="search-btn" aria-label="검색 버튼">🔍</button>
          </div>

          <!-- Dark Mode Toggle -->
          <button
            class="theme-toggle"
            data-theme-toggle
            aria-label="다크 모드 전환"
            aria-pressed="false"
          >
            <span class="theme-icon">🌙</span>
          </button>

          <!-- Mobile Menu Toggle -->
          <button
            class="nav-toggle"
            data-nav-toggle
            aria-expanded="false"
            aria-label="메뉴 열기"
          >
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
            <span class="nav-toggle__line"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero Section with Rich Visual Design -->
    <section class="hero" id="hero">
      <!-- Multi-layer Gradient Background -->
      <div class="hero__overlay"></div>

      <!-- Decorative Background Characters -->
      <img
        src="assets/images/hero-bg1.webp"
        alt="귀여운 캐릭터"
        class="hero__character hero__character--left"
      />
      <img
        src="assets/images/hero-bg2.webp"
        alt="귀여운 캐릭터"
        class="hero__character hero__character--right"
      />

      <!-- Decorative Elements Container -->
      <div class="hero__decorations">
        <!-- Left side floating emoji -->
        <div class="hero__decoration hero__decoration--emoji left-emoji">😊</div>

        <!-- Right side floating emoji -->
        <div class="hero__decoration hero__decoration--emoji right-emoji">😍</div>

        <!-- Top left sparkle -->
        <div class="hero__decoration hero__decoration--sparkle top-left-sparkle">✨</div>

        <!-- Right bottom star -->
        <div class="hero__decoration hero__decoration--star right-bottom-star">⭐</div>

        <!-- Small cube decoration -->
        <div class="hero__decoration hero__decoration--cube top-center-cube">💎</div>

        <!-- Heart Balloons - Right Top -->
        <div class="hero__heart-balloon heart-balloon-1">
          <span class="heart-balloon__content">❤️</span>
        </div>
        <div class="hero__heart-balloon heart-balloon-2">
          <span class="heart-balloon__content">❤️</span>
        </div>
        <div class="hero__heart-balloon heart-balloon-3">
          <span class="heart-balloon__content">❤️</span>
        </div>

        <!-- Heart Balloons - Right Middle -->
        <div class="hero__heart-balloon heart-balloon-4">
          <span class="heart-balloon__content">💕</span>
        </div>
        <div class="hero__heart-balloon heart-balloon-5">
          <span class="heart-balloon__content">💕</span>
        </div>
        <div class="hero__heart-balloon heart-balloon-6">
          <span class="heart-balloon__content">💕</span>
        </div>

        <!-- Glow dots -->
        <div class="hero__glow-dot glow-dot-1"></div>
        <div class="hero__glow-dot glow-dot-2"></div>
        <div class="hero__glow-dot glow-dot-3"></div>
      </div>

      <!-- Hero Content (Text) -->
      <div class="hero__content">
        <div class="hero__content-inner">
          <!-- Eyebrow -->
          <p class="hero__eyebrow" data-aos="fade-up" data-aos-delay="100">
            이모지로 즐거운 작업
          </p>

          <!-- Main Title -->
          <h1 class="hero__title" data-aos="fade-up" data-aos-delay="200">
            쉽고 빠른 이모지
            <br />
            복사 & 붙여넣기
          </h1>

          <!-- Subtitle -->
          <p class="hero__subtitle" data-aos="fade-up" data-aos-delay="300">
            3,600+개의 다양한 이모지와 특수문자,
            <br />
            한 번의 클릭으로 완벽하게!
          </p>

          <!-- CTA Buttons -->
          <div class="hero__buttons" data-aos="fade-up" data-aos-delay="400">
            <a href="#emoji" class="btn btn--primary-gradient">
              😊 이모지 무한 복사하기
            </a>
            <a href="#trends" class="btn btn--secondary-glow">
              ✨ 특수문자 트렌드 보기
            </a>
          </div>
        </div>
      </div>

      <!-- Scroll Indicator -->
      <div class="hero__scroll" data-aos="fade-up" data-aos-delay="600">
        <span class="hero__scroll-label">아래로 스크롤</span>
        <div class="hero__scroll-line"></div>
      </div>
    </section>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/sections/hero.js"></script>
  </body>
</html>
